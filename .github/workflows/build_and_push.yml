name: Docker Build and Push to GHCR

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - test
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - production
          
env:
  OWNER: '${{ github.repository_owner }}'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-build-push:
    name: docker / build-and-push
    if: >-
      (github.event_name == 'pull_request' && contains(fromJson('["production", "test"]'), github.base_ref)) ||
      (github.event_name == 'push' && contains(fromJson('["test"]'), github.ref_name)) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5 
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: set lower case owner name
        id: names_lc_calc
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_OUTPUT}
          echo "REPO_LC=$(echo "${GITHUB_EVENT_REPOSITORY_NAME}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_REPOSITORY_NAME: ${{ github.event.repository.name }}
          
      - name: Set Docker tag based on target branch
        id: set-tag
        run: |
          # Use github.ref_name for push events, base_ref for PRs
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET_BRANCH="${{ inputs.branch }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TARGET_BRANCH="${{ github.base_ref }}"
          else
            TARGET_BRANCH="${{ github.ref_name }}"
          fi

          if [[ "$TARGET_BRANCH" == "production" ]]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "TAG=test" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.names_lc_calc.outputs.OWNER_LC }}/${{ steps.names_lc_calc.outputs.REPO_LC }}:${{ steps.set-tag.outputs.TAG }}
            ghcr.io/${{ steps.names_lc_calc.outputs.OWNER_LC }}/${{ steps.names_lc_calc.outputs.REPO_LC }}:${{ github.sha }}